    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #1a365d; --accent: #e53e3e; --light: #f7fafc; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--light); }
        nav { background: var(--primary); padding: 0.8rem; position: sticky; top: 0; z-index: 100; }

        .news-card { background: var(--light); border-radius: 12px; overflow: hidden; }
        .news-image { width: 100%; height: 150px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .news-content { padding: 1rem; }
        .news-tag { display: inline-block; background: var(--accent); color: white; padding: 0.2rem 0.5rem; border-radius: 10px; font-size: 0.75rem; }
