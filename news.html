        let currentFilter = 'all';
        let currentDateFilter = 'all';
        let displayCount = 6;
        
        // 渲染新闻卡片
        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const filtered = newsData.filter(news => {
                const categoryMatch = currentFilter === 'all' || news.category === currentFilter;
                return categoryMatch;
            });
            
            const toShow = filtered.slice(0, displayCount);
            
            grid.innerHTML = toShow.map(news => `
                <article class="news-card" onclick="viewNews(${news.id})">
                    <div class="news-image">
                        ${getCategoryEmoji(news.category)}
                    </div>
                    <div class="news-content">
                        <span class="news-category ${news.category}">${news.categoryName}</span>
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-meta">📅 ${news.date} · 📰 ${news.source}</p>
                        <p class="news-summary">${news.summary}</p>
                        <div class="news-tags">
                            ${news.tags.map(tag => `<span class="news-tag">#${tag}</span>`).join('')}
                        </div>
                    </div>
                </article>
            `).join('');
        }
        
        // 获取分类图标
        function getCategoryEmoji(category) {
            const emojis = {
                sports: '🏟️',
                highrise: '🏢',
                bridge: '🌉',
                tech: '🔧',
                policy: '📋'
            };
            return emojis[category] || '📰';
        }
        
        // 分类筛选
        function filterByCategory(category) {
            currentFilter = category;
            displayCount = 6;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderNews();
        }
        
        // 日期筛选
        function filterByDate(date) {
            currentDateFilter = date;
            document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            // 实际应用中需要根据日期过滤
            renderNews();
        }
        
        // 加载更多
        function loadMore() {
            displayCount += 4;
            renderNews();
        }
        
        // 查看新闻详情
        function viewNews(id) {
            const news = newsData.find(n => n.id === id);
            alert(`📰 ${news.title}\n\n${news.summary}\n\n来源：${news.source} · 日期：${news.date}`);
        }
        
        // 初始化
        renderNews();
    </script>
